<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PTOMB NEWS - Advertisement Manager</title><link rel="stylesheet" href="admin.css"></head><body>
<script>
if(sessionStorage.getItem("adminLogin")!=="true"){location.href="admin-login.html";}
function logout(){sessionStorage.clear();location.href="admin-login.html";}
</script>
<div class="sidebar"><h2>PTOMB NEWS</h2><ul>
<li onclick="location.href='admin.html'">🏠 Dashboard</li>
<li onclick="location.href='staff.html'">👥 Staff</li>
<li onclick="location.href='ads.html'">📢 Advertisements</li>
<li onclick="location.href='index.html'">🌐 Website</li>
<li onclick="logout()">🚪 Logout</li>
</ul></div>
<div class="main">
<h1>Advertisement Manager</h1>
<div class="cards"><div class="card"><h2>Total Ads</h2><h1 id="totalAds">0</h1></div></div>
<div class="page">
<h2>Publish Advertisement</h2>
<select id="adType"><option value="image">Image Banner</option><option value="video">Video Advertisement</option><option value="text">Text Advertisement</option></select>
<input type="file" id="adFile">
<textarea id="adText" placeholder="Advertisement Text"></textarea>
<input type="url" id="adLink" placeholder="Sponsor Website URL">
<button onclick="saveAdvertisement()">Publish Advertisement</button>
</div>
<div class="page">
<h2>Published Advertisements</h2>
<input type="text" id="searchAd" placeholder="Search Advertisement..." onkeyup="searchAdvertisement()">
<div id="adsList"></div>
</div>
</div>
<script src="ads.js"></script>
</body></html>
