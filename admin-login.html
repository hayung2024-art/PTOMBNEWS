<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTOMB NEWS - Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:380px;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.login-box h2{
text-align:center;
color:#d60000;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#d60000;
color:#fff;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#b00000;
}

#error{
margin-top:10px;
color:red;
text-align:center;
}

.back{
text-align:center;
margin-top:15px;
}

.back a{
text-decoration:none;
color:#d60000;
font-weight:bold;
}
</style>

</head>
<body>

<div class="login-box">

<h2>PTOMB NEWS</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

<div class="back">
<a href="index.html">← Back to Home</a>
</div>

</div>

<script>

const users=[

{
username:"admin",
password:"PTOMB@123",
role:"admin"
},

{
username:"editor",
password:"editor123",
role:"editor"
},

{
username:"reporter",
password:"reporter123",
role:"staff"
}

];

function login(){

const user=document.getElementById("username").value.trim();

const pass=document.getElementById("password").value.trim();

const account=users.find(function(u){

return u.username===user && u.password===pass;

});

if(account){

sessionStorage.setItem("adminLogin","true");

sessionStorage.setItem("username",account.username);

sessionStorage.setItem("role",account.role);

window.location.href="admin.html";

}else{

document.getElementById("error").innerHTML="Invalid Username or Password";

}

}

</script>

</body>
</html>
